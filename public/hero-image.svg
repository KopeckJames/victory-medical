<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" width="900" height="1100">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e2d3c;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#163d52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e4f6a;stop-opacity:1" />
    </linearGradient>

    <!-- Copper glow -->
    <radialGradient id="copperGlow" cx="55%" cy="38%" r="40%">
      <stop offset="0%" style="stop-color:#c97a3c;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#c97a3c;stop-opacity:0" />
    </radialGradient>

    <!-- Copper ring gradient -->
    <linearGradient id="ringGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c97a3c;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#e09a5c;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#c4a87a;stop-opacity:0.1" />
    </linearGradient>

    <linearGradient id="ringGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c97a3c;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#163d52;stop-opacity:0" />
    </linearGradient>

    <!-- Vertical glow beam -->
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c97a3c;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#c97a3c;stop-opacity:0.4" />
      <stop offset="70%" style="stop-color:#c97a3c;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#c97a3c;stop-opacity:0" />
    </linearGradient>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(201,122,60,0.12)" />
    </pattern>

    <!-- Fine grid -->
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(201,122,60,0.04)" stroke-width="0.5"/>
    </pattern>

    <!-- Blur filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
    </filter>

    <!-- Clip for the whole image -->
    <clipPath id="imgClip">
      <rect width="900" height="1100"/>
    </clipPath>
  </defs>

  <g clip-path="url(#imgClip)">
    <!-- Background -->
    <rect width="900" height="1100" fill="url(#bgGrad)"/>
    <rect width="900" height="1100" fill="url(#dots)"/>
    <rect width="900" height="1100" fill="url(#grid)"/>

    <!-- Ambient copper glow blob -->
    <ellipse cx="520" cy="400" rx="320" ry="300" fill="url(#copperGlow)"/>

    <!-- Soft glow behind central element -->
    <ellipse cx="490" cy="440" rx="180" ry="180" fill="#c97a3c" opacity="0.08" filter="url(#softglow)"/>

    <!-- === OUTER ORBIT RING === -->
    <circle cx="490" cy="440" r="300" fill="none" stroke="rgba(201,122,60,0.12)" stroke-width="1"/>
    <!-- Orbit arc highlight -->
    <path d="M 490 140 A 300 300 0 0 1 790 440" fill="none" stroke="url(#ringGrad1)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Orbit dot markers -->
    <circle cx="490" cy="140" r="3.5" fill="#c97a3c" opacity="0.7"/>
    <circle cx="790" cy="440" r="3.5" fill="#c97a3c" opacity="0.7"/>
    <circle cx="680" cy="187" r="2" fill="#e09a5c" opacity="0.5"/>
    <circle cx="765" cy="310" r="2" fill="#e09a5c" opacity="0.4"/>

    <!-- === MIDDLE RING === -->
    <circle cx="490" cy="440" r="210" fill="none" stroke="rgba(201,122,60,0.18)" stroke-width="1"/>
    <path d="M 490 230 A 210 210 0 0 1 700 440" fill="none" stroke="rgba(201,122,60,0.5)" stroke-width="1" stroke-linecap="round"/>

    <!-- === INNER RING === -->
    <circle cx="490" cy="440" r="130" fill="none" stroke="rgba(201,122,60,0.25)" stroke-width="1.5"/>
    <path d="M 490 310 A 130 130 0 1 1 360 440" fill="none" stroke="url(#ringGrad2)" stroke-width="2" stroke-linecap="round"/>

    <!-- === CENTER EMBLEM === -->
    <!-- Center disc glow -->
    <circle cx="490" cy="440" r="72" fill="rgba(201,122,60,0.06)"/>
    <circle cx="490" cy="440" r="72" fill="none" stroke="rgba(201,122,60,0.35)" stroke-width="1.5"/>

    <!-- Inner fill -->
    <circle cx="490" cy="440" r="58" fill="rgba(14,45,60,0.85)"/>
    <circle cx="490" cy="440" r="58" fill="none" stroke="rgba(201,122,60,0.6)" stroke-width="1"/>

    <!-- Medical cross -->
    <rect x="480" y="412" width="20" height="56" rx="4" fill="#c97a3c" opacity="0.85"/>
    <rect x="462" y="430" width="56" height="20" rx="4" fill="#c97a3c" opacity="0.85"/>

    <!-- Cross glow -->
    <rect x="480" y="412" width="20" height="56" rx="4" fill="#e09a5c" opacity="0.3" filter="url(#glow)"/>

    <!-- === PULSE ARCS (EKG-like) === -->
    <!-- Arc 1 -->
    <path d="M 250 440 Q 280 440 300 440 L 320 390 L 340 490 L 360 415 L 380 440 Q 420 440 430 440"
          fill="none" stroke="#c97a3c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <!-- Arc 2 - mirrored right -->
    <path d="M 560 440 Q 570 440 590 440 L 610 395 L 630 485 L 650 420 L 670 440 Q 700 440 730 440"
          fill="none" stroke="#c97a3c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

    <!-- Pulse dots on arcs -->
    <circle cx="340" cy="490" r="3" fill="#c97a3c" opacity="0.7"/>
    <circle cx="630" cy="485" r="3" fill="#c97a3c" opacity="0.5"/>

    <!-- === FLOATING DATA NODES === -->
    <!-- Node 1: top right -->
    <g transform="translate(680, 220)">
      <circle cx="0" cy="0" r="28" fill="rgba(14,45,60,0.9)" stroke="rgba(201,122,60,0.4)" stroke-width="1"/>
      <!-- DNA helix simplified -->
      <path d="M -8 -14 Q 0 -8 8 -14 M -8 -7 Q 0 -1 8 -7 M -8 0 Q 0 6 8 0 M -8 7 Q 0 13 8 7"
            fill="none" stroke="#c97a3c" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
      <line x1="-8" y1="-14" x2="-8" y2="14" stroke="rgba(201,122,60,0.3)" stroke-width="0.8"/>
      <line x1="8" y1="-14" x2="8" y2="14" stroke="rgba(201,122,60,0.3)" stroke-width="0.8"/>
    </g>
    <!-- Connector line node 1 -->
    <line x1="652" y1="233" x2="620" y2="256" stroke="rgba(201,122,60,0.2)" stroke-width="1" stroke-dasharray="3,4"/>

    <!-- Node 2: left middle -->
    <g transform="translate(190, 500)">
      <circle cx="0" cy="0" r="24" fill="rgba(14,45,60,0.9)" stroke="rgba(201,122,60,0.35)" stroke-width="1"/>
      <!-- Heart rate icon -->
      <path d="M 0 -4 C -8 -12 -18 -6 -14 4 L 0 16 L 14 4 C 18 -6 8 -12 0 -4 Z"
            fill="none" stroke="#c97a3c" stroke-width="1.3" stroke-linejoin="round" transform="scale(0.65) translate(0,-4)" opacity="0.8"/>
    </g>
    <!-- Connector line node 2 -->
    <line x1="214" y1="486" x2="280" y2="462" stroke="rgba(201,122,60,0.2)" stroke-width="1" stroke-dasharray="3,4"/>

    <!-- Node 3: bottom -->
    <g transform="translate(490, 650)">
      <circle cx="0" cy="0" r="22" fill="rgba(14,45,60,0.9)" stroke="rgba(201,122,60,0.3)" stroke-width="1"/>
      <!-- Caduceus-like symbol -->
      <line x1="0" y1="-13" x2="0" y2="13" stroke="#c97a3c" stroke-width="1.5" opacity="0.7"/>
      <path d="M -8 -8 C -8 -2 8 -2 8 4 C 8 10 -8 10 -8 4" fill="none" stroke="#c97a3c" stroke-width="1.1" opacity="0.6"/>
    </g>
    <!-- Connector line node 3 -->
    <line x1="490" y1="628" x2="490" y2="572" stroke="rgba(201,122,60,0.2)" stroke-width="1" stroke-dasharray="3,4"/>

    <!-- Node 4: upper left -->
    <g transform="translate(310, 270)">
      <circle cx="0" cy="0" r="20" fill="rgba(14,45,60,0.9)" stroke="rgba(201,122,60,0.3)" stroke-width="1"/>
      <!-- Leaf / wellness -->
      <path d="M 0 10 C -10 0 -10 -10 0 -10 C 10 -10 10 0 0 10 Z"
            fill="none" stroke="#c97a3c" stroke-width="1.2" opacity="0.7"/>
      <line x1="0" y1="-10" x2="0" y2="10" stroke="rgba(201,122,60,0.4)" stroke-width="0.8"/>
    </g>

    <!-- === STAT BADGES === -->
    <!-- Badge: Since 1996 -->
    <g transform="translate(105, 310)">
      <rect x="0" y="0" width="130" height="52" rx="8" fill="rgba(14,45,60,0.92)" stroke="rgba(201,122,60,0.3)" stroke-width="1"/>
      <text x="14" y="20" font-family="Georgia, serif" font-size="9" fill="rgba(196,168,122,0.8)" letter-spacing="2">SINCE</text>
      <text x="14" y="40" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#e09a5c">1996</text>
    </g>

    <!-- Badge: 3 Locations -->
    <g transform="translate(660, 600)">
      <rect x="0" y="0" width="140" height="52" rx="8" fill="rgba(14,45,60,0.92)" stroke="rgba(201,122,60,0.3)" stroke-width="1"/>
      <text x="14" y="20" font-family="Georgia, serif" font-size="9" fill="rgba(196,168,122,0.8)" letter-spacing="2">LOCATIONS</text>
      <text x="14" y="40" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#e09a5c">Austin, TX</text>
    </g>

    <!-- Badge: 25+ Years -->
    <g transform="translate(680, 340)">
      <rect x="0" y="0" width="120" height="52" rx="8" fill="rgba(14,45,60,0.92)" stroke="rgba(201,122,60,0.3)" stroke-width="1"/>
      <text x="14" y="20" font-family="Georgia, serif" font-size="9" fill="rgba(196,168,122,0.8)" letter-spacing="2">PROVIDERS</text>
      <text x="14" y="40" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#e09a5c">25+</text>
    </g>

    <!-- === VERTICAL BEAM (right side accent) === -->
    <rect x="848" y="0" width="1.5" height="1100" fill="url(#beamGrad)" opacity="0.5"/>
    <rect x="844" y="0" width="0.5" height="1100" fill="rgba(201,122,60,0.15)"/>

    <!-- === HORIZONTAL ACCENT LINES === -->
    <line x1="0" y1="760" x2="900" y2="760" stroke="rgba(201,122,60,0.06)" stroke-width="1"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="rgba(201,122,60,0.06)" stroke-width="1"/>

    <!-- === CORNER BRACKET (top right) === -->
    <path d="M 900 0 L 820 0 L 820 6 L 894 6 L 894 80 L 900 80 Z" fill="rgba(201,122,60,0.15)"/>

    <!-- === CORNER BRACKET (bottom left) === -->
    <path d="M 0 1100 L 80 1100 L 80 1094 L 6 1094 L 6 1020 L 0 1020 Z" fill="rgba(201,122,60,0.12)"/>

    <!-- === SCATTERED SMALL DOTS === -->
    <circle cx="160" cy="180" r="2" fill="#c97a3c" opacity="0.4"/>
    <circle cx="740" cy="160" r="1.5" fill="#c97a3c" opacity="0.3"/>
    <circle cx="820" cy="580" r="2" fill="#c97a3c" opacity="0.35"/>
    <circle cx="100" cy="700" r="1.5" fill="#c97a3c" opacity="0.25"/>
    <circle cx="200" cy="900" r="2" fill="#c4a87a" opacity="0.2"/>
    <circle cx="760" cy="880" r="1.5" fill="#c4a87a" opacity="0.2"/>
    <circle cx="450" cy="780" r="1.5" fill="#c97a3c" opacity="0.2"/>
    <circle cx="580" cy="260" r="2" fill="#c97a3c" opacity="0.3"/>
    <circle cx="360" cy="680" r="1.5" fill="#c4a87a" opacity="0.25"/>

    <!-- === BOTTOM FADE === -->
    <linearGradient id="bottomFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#050f15;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#050f15;stop-opacity:0.85"/>
    </linearGradient>
    <rect width="900" height="300" y="800" fill="url(#bottomFade)"/>

    <!-- === LEFT EDGE FADE (for blend into content) === -->
    <linearGradient id="leftFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#050f15;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#050f15;stop-opacity:0"/>
    </linearGradient>
    <rect width="380" height="1100" fill="url(#leftFade)"/>
  </g>
</svg>
